<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Список завдань</title>
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }


:root {
  --bg:     #f5f5f0; /* колір фону сторінки        */
  --white:  #ffffff; /* колір карток завдань        */
  --text:   #222;    /* основний колір тексту       */
  --muted:  #888;    /* сірий текст (дати, підписи) */
  --accent: #3b5bdb; /* синій — кнопка "Додати"     */
  --danger: #e03131; /* червоний — кнопка видалення */
  --green:  #2f9e44; /* зелений — кнопка збереження */
  --border: #ddd;    /* колір рамок                 */
  --radius: 8px;     /* заокруглення кутів          */
}

/* ЗАГАЛЬНІ СТИЛІ СТОРІНКИ */
body {
  font-family: 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 2rem 1rem; /* відступи зверху/знизу і по боках */
}

.container { max-width: 600px; margin: 0 auto; }

h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: .25rem; }
.subtitle { color: var(--muted); font-size: .9rem; margin-bottom: 1.5rem; }

/*ФОРМА ДОДАВАННЯ ЗАВДАННЯ*/
.add-row { display: flex; gap: .5rem; margin-bottom: 1rem; }

.add-row input {
  flex: 1; /* займає весь вільний простір */
  padding: .65rem .9rem;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  font-size: .95rem;
  font-family: inherit;
  background: var(--white);
  outline: none;
  transition: border-color .2s; /* плавна зміна рамки при фокусі */
}
/* Рамка стає синьою коли поле активне */
.add-row input:focus { border-color: var(--accent); }

.btn {
  padding: .65rem 1.1rem;
  border: none;
  border-radius: var(--radius);
  font-size: .9rem;
  font-family: inherit;
  cursor: pointer;
  font-weight: 500;
  transition: opacity .15s, transform .1s;
}
.btn:hover  { opacity: .88; }   /*затемнення*/           
.btn:active { transform: scale(.97); }   /* натискання */   
.btn-primary { background: var(--accent); color: #fff; }
.btn-danger  { background: var(--danger); color: #fff; }
.btn-save    { background: var(--green);  color: #fff; }
.btn-sm      { padding: .35rem .7rem; font-size: .8rem; } /* маленькі кнопки для дій в картці завдання */

/*ПАНЕЛЬ СОРТУВАННЯ */
.toolbar {
  display: flex;
  flex-wrap: wrap;  
  gap: .4rem;
  margin-bottom: 1.2rem;
  align-items: center;
}
.toolbar label {
  font-size: .78rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .05em;
  margin-right: .2rem;
}
/* Кнопки сортування*/
.sort-btn {
  padding: .3rem .75rem;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  background: var(--white);
  font-size: .8rem;
  font-family: inherit;
  cursor: pointer;
  transition: all .15s;
}
.sort-btn:hover  { border-color: var(--accent); color: var(--accent); }
.sort-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ПОРОЖНІЙ СТАН*/
.empty { text-align: center; padding: 3rem; color: var(--muted); font-size: .95rem; }

/* СПИСОК ЗАВДАНЬ */
#task-list { list-style: none; display: flex; flex-direction: column; gap: .5rem; }

/*НАПОВНЕННЯ КАРТКИ ЗАВДАНЬ*/
.task {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: .75rem 1rem;
  display: flex;
  align-items: flex-start;
  gap: .7rem;
  animation: fadeIn .25s ease; /* поява */
}
/* Виконане завдання — сірий фон */
.task.done { background: #f9f9f9; }


/* Поява нового завдання — падає зверху */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}
/* Видалення завдання — зникає і стискається */
@keyframes fadeOut {
  from { opacity: 1; max-height: 100px; }
  to   { opacity: 0; max-height: 0; padding: 0; margin: 0; overflow: hidden; }
}

.task.removing { animation: fadeOut .25s ease forwards; }

/* ЕЛЕМЕНТИ ВСЕРЕДИНІ КАРТКИ */

/* Чекбокс */
.task input[type=checkbox] {
  width: 1.1rem; height: 1.1rem;
  accent-color: var(--accent);
  cursor: pointer;
  flex-shrink: 0;   /* не стискається */
  margin-top: .15rem;
}

/* Блок з текстом і датою */
.task-body { flex: 1; min-width: 0; }

/* Текст завдання */
.task-text { font-size: .95rem; line-height: 1.4; word-break: break-word; }

/* Текст виконаного завдання */
.task.done .task-text { text-decoration: line-through; color: var(--muted); }

/* Дата */
.task-meta { font-size: .72rem; color: var(--muted); margin-top: .25rem; }

/* Поле вводу при редагуванні */
.task-edit-input {
  width: 100%;
  font-family: inherit;
  font-size: .95rem;
  border: none;
  border-bottom: 2px solid var(--accent); 
  outline: none;
  background: transparent;
  padding: .1rem 0;
}

/* Кнопки дій */
.task-actions { display: flex; gap: .3rem; flex-shrink: 0; }

/* Лічильник завдань */
.counter { font-size: .82rem; color: var(--muted); margin-bottom: .6rem; }
</style>
</head>
<body>

<div class="container">
  <h1>📋 Завдання</h1>
  <p class="subtitle">Простий список справ</p>

  <form id="add-form" class="add-row" novalidate>
    <input id="task-input" type="text" placeholder="Введіть нове завдання..."
           required minlength="2" maxlength="200" autocomplete="off"/>
    <button type="submit" class="btn btn-primary">Додати</button>
  </form>

  <!-- Панель сортування -->
  <div class="toolbar">
    <label>Сортування:</label>
    <button class="sort-btn" data-sort="date-asc">↑ Дата</button>
    <button class="sort-btn" data-sort="date-desc">↓ Дата</button>
    <button class="sort-btn" data-sort="status">Стан</button>
    <button class="sort-btn" data-sort="updated">Оновлення</button>
    <button class="sort-btn" data-sort="none">✕ Скинути</button>
  </div>

  <div class="counter" id="counter"></div>

  <div class="empty" id="empty">Список порожній. Додайте перше завдання!</div>

  <ul id="task-list"></ul>
</div>

<script>

// Утиліти для роботи з датами та унікальними ID
const uid = () => Date.now() + Math.random().toString(36).slice(2);
const now = () => new Date().toISOString();
const fmt = iso => new Date(iso).toLocaleString('uk-UA', {
  day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit'
});

//  Функції для роботи із завданнями 

// Створює нове завдання-обʼєкт з тексту
const createTask = text => ({
  id: uid(),
  text: text.trim(),
  done: false,
  createdAt: now(),
  updatedAt: now()
});

const toggleTask = t => ({ ...t, done: !t.done, updatedAt: now() });

const editTask = (t, text) => ({ ...t, text: text.trim(), updatedAt: now() });

const removeTask = (tasks, id) => tasks.filter(t => t.id !== id);

const addTask = (tasks, task) => [task, ...tasks];


// СОРТУВАННЯ

const sorters = {
  'date-asc':  (a, b) => new Date(a.createdAt) - new Date(b.createdAt), // старіші вгорі
  'date-desc': (a, b) => new Date(b.createdAt) - new Date(a.createdAt), // новіші вгорі
  'status':    (a, b) => Number(a.done) - Number(b.done),               // невиконані вгорі
  'updated':   (a, b) => new Date(b.updatedAt) - new Date(a.updatedAt), // нещодавно змінені вгорі
  'none': null, // без сортування
};

// Повертає відсортований масив (або копію без сортування)
const sortTasks = (tasks, key) =>
  sorters[key] ? [...tasks].sort(sorters[key]) : [...tasks];


// СТАН ЗАСТОСУНКУ

let state = {
  tasks: [],       
  sortKey: 'none'   
};

// Оновлює стан і перемальовує сторінку

const setState = patch => {
  state = { ...state, ...patch }; 
  render(); 
};


// ПОСИЛАННЯ НА DOM-ЕЛЕМЕНТИ

const $list    = document.getElementById('task-list'); // <ul> зі списком
const $empty   = document.getElementById('empty');     // блок "список порожній"
const $counter = document.getElementById('counter');   // лічильник
const $form    = document.getElementById('add-form');  // форма додавання
const $input   = document.getElementById('task-input');// поле вводу


const render = () => {
  const sorted = sortTasks(state.tasks, state.sortKey);
  const total  = state.tasks.length;
  const done   = state.tasks.filter(t => t.done).length;

  // Показуємо/ховаємо блок "порожній список"
  $empty.style.display = total === 0 ? 'block' : 'none';

  // Оновлюємо лічильник
  $counter.textContent = total > 0 ? `Всього: ${total} · Виконано: ${done}` : '';

  // Підсвічуємо активну кнопку сортування
  document.querySelectorAll('.sort-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.sort === state.sortKey)
  );

  $list.innerHTML = '';
  sorted.forEach(t => $list.appendChild(buildItem(t)));
};

// BUILD ITEM — будує DOM-елемент картки завдання
// Приймає обʼєкт task, повертає <li>

const buildItem = task => {
  const li = document.createElement('li');
  li.className = 'task' + (task.done ? ' done' : '');
  li.dataset.id = task.id;

  // Чекбокс — при зміні перемикає стан завдання
  const chk = document.createElement('input');
  chk.type = 'checkbox';
  chk.checked = task.done;
  chk.addEventListener('change', () =>
    setState({ tasks: state.tasks.map(t => t.id === task.id ? toggleTask(t) : t) })
  );

  // Блок з текстом і датою
  const body = document.createElement('div');
  body.className = 'task-body';

  const txt = document.createElement('div');
  txt.className = 'task-text';
  txt.textContent = task.text;

  // Показуємо дату створення, і дату оновлення якщо відрізняється
  const meta = document.createElement('div');
  meta.className = 'task-meta';
  meta.textContent = '📌 ' + fmt(task.createdAt) +
    (task.createdAt !== task.updatedAt ? '  · 🔄 ' + fmt(task.updatedAt) : '');

  body.append(txt, meta);

  const acts = document.createElement('div');
  acts.className = 'task-actions';
  /* редагування */
  const editBtn = document.createElement('button');
  editBtn.className = 'btn btn-sm';
  editBtn.style.cssText = 'background:#868e96;color:#fff';
  editBtn.textContent = '✏️';
  editBtn.addEventListener('click', () => startEdit(task.id, li, txt, acts, meta));
  /* delete */
  const delBtn = document.createElement('button');
  delBtn.className = 'btn btn-sm btn-danger';
  delBtn.textContent = '🗑';
  delBtn.addEventListener('click', () => {
    li.classList.add('removing'); // запускаємо CSS-анімацію fadeOut
    li.addEventListener('animationend', () =>
      setState({ tasks: removeTask(state.tasks, task.id) }), { once: true }
    );
  });

  acts.append(editBtn, delBtn);
  li.append(chk, body, acts);
  return li;
};


/*режим редагування*/
const startEdit = (id, li, txtEl, acts, meta) => {
  // Якщо вже редагується — нічого не робимо
  if (li.querySelector('.task-edit-input')) return;

  txtEl.style.display = 'none';

  const inp = document.createElement('input');
  inp.type = 'text';
  inp.className = 'task-edit-input';
  inp.value = txtEl.textContent; 
  li.querySelector('.task-body').insertBefore(inp, meta);
  inp.focus();

  // Кнопка збереження 
  const saveBtn = document.createElement('button');
  saveBtn.className = 'btn btn-sm btn-save';
  saveBtn.textContent = '✔';
  acts.prepend(saveBtn);

  // Зберегти зміни
  const commit = () => {
    const val = inp.value.trim();
    if (val.length < 2) return; 
    setState({ tasks: state.tasks.map(t => t.id === id ? editTask(t, val) : t) });
  };

  saveBtn.addEventListener('click', commit);
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter')  commit();                                        
    if (e.key === 'Escape') {                                              
      txtEl.style.display = '';
      inp.remove();
      saveBtn.remove();
    }
  });
};


// ОБРОБНИКИ ПОДІЙ

// Сабміт форми — додаємо нове завдання
$form.addEventListener('submit', e => {
  e.preventDefault(); 
  const val = $input.value.trim();
  if (val.length < 2) return; 
  setState({ tasks: addTask(state.tasks, createTask(val)) });
  $input.value = ''; 
  $input.focus();    
});

// Кнопки сортування 
document.querySelectorAll('.sort-btn').forEach(b =>
  b.addEventListener('click', () => setState({ sortKey: b.dataset.sort }))
);

render();
</script>
</body>
</html>
