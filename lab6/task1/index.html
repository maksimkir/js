<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Список товарів</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <h1>Список товарів</h1>
  <span id="total-price">Загальна вартість: 0 ₴</span>
</header>

<main>

  <!-- ФІЛЬТРИ ТА СОРТУВАННЯ -->
  <div class="toolbar">
    <div class="toolbar-row">
      <span class="toolbar-label">Фільтр:</span>
      <div id="filter-buttons"></div>
    </div>
    <div class="toolbar-row">
      <span class="toolbar-label">Сортування:</span>
      <button data-sort="price">За ціною</button>
      <button data-sort="createdAt">За датою створення</button>
      <button data-sort="updatedAt">За датою оновлення</button>
      <button id="reset-sort">Скинути</button>
    </div>
  </div>

  <p id="empty-msg">Наразі список товарів пустий. Додайте новий товар.</p>

  <div id="product-list"></div>

  <button id="add-btn">+ Додати новий товар</button>

</main>

<!-- МОДАЛЬНЕ ВІКНО -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modal-title">Новий товар</h2>
    <form id="product-form" novalidate>
      <input type="hidden" id="edit-id" />

      <div class="form-group">
        <label for="f-name">Назва товару</label>
        <input type="text" id="f-name" placeholder="Назва" required minlength="2" maxlength="80" />
      </div>

      <div class="form-group">
        <label for="f-price">Ціна (₴)</label>
        <input type="number" id="f-price" placeholder="0.00" required min="0.01" step="0.01" />
      </div>

      <div class="form-group">
        <label for="f-category">Категорія</label>
        <select id="f-category" required>
          <option value="" disabled selected>Оберіть категорію</option>
          <option>Електроніка</option>
          <option>Одяг</option>
          <option>Книги</option>
          <option>Меблі</option>
          <option>Спорт</option>
        </select>
      </div>

      <div class="form-group">
        <label for="f-image">URL зображення</label>
        <input type="url" id="f-image" placeholder="https://..." required />
      </div>

      <div class="modal-actions">
        <button type="button" id="cancel-btn">Скасувати</button>
        <button type="submit" id="submit-btn">Додати</button>
      </div>
    </form>
  </div>
</div>

<!-- SNACKBAR -->
<div id="snackbar"></div>

<script src="script.js"></script>
</body>
</html>
