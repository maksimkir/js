<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Лабораторна робота №2</title>
</head>
<body>

<div class="container">
    <h2>Оцінка:</h2>
    <input type="number" id="gradeInput" placeholder="Введіть бал (0-100)">
    <button onclick="handleGrade()">Перевірити бал</button>
    <div id="gradeOut" class="result"></div>

    <hr>

    <h2>Сезон:</h2>
    <input type="number" id="monthInput" placeholder="Номер місяця (1-12)">
    <button onclick="handleSeason()">Визначити сезон</button>
    <div id="seasonOut" class="result"></div>
</div>

<script src="script3.js"></script>
</body>
</html>
