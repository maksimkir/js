<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Логічні оператори JS</title>
</head>
<body>

    <section>
        <h3>Перевірка діапазону (10 - 50)</h3>
        <input type="number" id="numInput" placeholder="Введіть число">
        <button onclick="checkRange()">Перевірити</button>
        <p id="rangeResult"></p>
    </section>

    <hr>

    <section>
        <h3>Зміна стану (NOT)</h3>
        <p>Поточний стан: <strong id="statusText">true</strong></p>
        <button onclick="toggleStatus()">Змінити стан</button>
    </section>

    <script src="script2.js"></script>
</body>
</html>
